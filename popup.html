<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
      color: #333;
    }
    .header {
      background: linear-gradient(135deg, #4285f4, #34a853);
      color: white;
      padding: 16px;
      text-align: center;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.9; margin-top: 4px; }
    .content { padding: 16px; }
    .page-info {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e0e0e0;
    }
    .page-info .title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .page-info .url {
      font-size: 11px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 4px;
    }
    .options {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e0e0e0;
    }
    .options label {
      display: flex;
      align-items: center;
      font-size: 12px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .options label:last-child { margin-bottom: 0; }
    .options input[type="checkbox"] {
      margin-right: 8px;
      accent-color: #4285f4;
    }
    .progress-area {
      display: none;
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e0e0e0;
    }
    .progress-bar-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4285f4, #34a853);
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .progress-percent {
      font-size: 11px;
      color: #666;
      min-width: 36px;
      text-align: right;
    }
    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
    .progress-stats .success { color: #34a853; }
    .progress-stats .skipped { color: #fbbc04; }
    .progress-stats .failed { color: #ea4335; }
    .status-text {
      font-size: 12px;
      color: #333;
      margin-bottom: 4px;
    }
    .download-path {
      font-size: 11px;
      color: #888;
      margin-top: 8px;
      padding: 6px 8px;
      background: #f0f0f0;
      border-radius: 4px;
    }
    /* 模态弹窗遮罩 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      max-width: 300px;
      width: 90%;
      text-align: center;
    }
    .modal-box .modal-icon { font-size: 36px; margin-bottom: 8px; }
    .modal-box .modal-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #d32f2f; }
    .modal-box .modal-desc { font-size: 12px; color: #666; line-height: 1.5; margin-bottom: 16px; }
    .modal-box .modal-btns { display: flex; gap: 8px; }
    .modal-box .modal-btns button { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .modal-box .btn-cancel { background: #f5f5f5; color: #666; }
    .modal-box .btn-goto { background: #1a73e8; color: white; }
    .modal-box .btn-goto:hover { background: #1557b0; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary {
      background: linear-gradient(135deg, #4285f4, #34a853);
      color: white;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>💾 网页保存器</h1>
    <p>保存网页为离线可查看的 HTML</p>
  </div>
  <div class="content">
    <!-- 当前页面信息 -->
    <div class="page-info">
      <div class="title" id="pageTitle">加载中...</div>
      <div class="url" id="pageUrl">-</div>
    </div>

    <!-- 选项 -->
    <div class="options">
      <label>
        <input type="checkbox" id="optImages" checked> 下载图片资源
      </label>
      <label>
        <input type="checkbox" id="optVideos" checked> 下载视频资源
      </label>
      <label>
        <input type="checkbox" id="optAudio" checked> 下载音频资源
      </label>
      <label>
        <input type="checkbox" id="optInlineStyles" checked> 保留内联样式
      </label>
    </div>

    <!-- 进度 -->
    <div class="progress-area" id="progressArea">
      <div class="status-text" id="statusText">准备中...</div>
      <div class="progress-bar-container">
        <div class="progress-bar">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <span class="progress-percent" id="progressPercent">0%</span>
      </div>
      <div class="progress-stats">
        <span class="success" id="statsSuccess"></span>
        <span class="skipped" id="statsSkipped"></span>
        <span class="failed" id="statsFailed"></span>
      </div>
    </div>

    <!-- 下载目录提示 -->
    <div class="download-path" id="downloadPathHint">
      📁 保存到: 下载目录/WebPageSaver/
    </div>

    <!-- 操作按钮 -->
    <button class="btn btn-primary" id="saveBtn" style="margin-top:12px">保存当前网页</button>
  </div>

  <!-- 浏览器设置检测弹窗 -->
  <div class="modal-overlay" id="downloadSettingModal">
    <div class="modal-box">
      <div class="modal-icon">⚠️</div>
      <div class="modal-title">请关闭"下载前询问"</div>
      <div class="modal-desc">
        您的浏览器开启了"下载前询问每个文件的保存位置"，<br>
        保存网页时每个文件都会弹出确认框，无法正常使用。<br><br>
        请前往浏览器设置关闭该选项后重试。
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" id="modalCancel">取消</button>
        <button class="btn-goto" id="modalGoSettings">前往设置</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
